<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Heart-Sync 控制器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body {
            background: #f8f8f8;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 24px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            font-weight: 500;
            color: #2c3e2f;
            margin-bottom: 8px;
        }
        .status {
            font-size: 13px;
            margin-bottom: 20px;
        }
        .online { color: #2e7d32; }
        .offline { color: #c62828; }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 40px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 8px;
            outline: none;
        }
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #888;
            margin-bottom: 16px;
        }
        button {
            background: #c9a96e;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #b88b4a;
        }
        .device-status {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Heart-Sync</h1>
    <div id="status" class="status offline">⚫ 離線</div>
    <input type="text" id="msgInput" placeholder="輸入訊息..." maxlength="100" autocomplete="off">
    <div class="char-count"><span id="charCount">0</span> / 100</div>
    <button id="sendBtn">發送訊息</button>
    <div class="device-status">
        📟 裝置狀態：<span id="deviceState">等待同步</span>
    </div>
</div>

<script>
    // MQTT 設定 (與你原始版本完全相同)
    const host = "a58c5e1007e94bcea2641a1d027cd2f9.s1.eu.hivemq.cloud";
    const port = 8884;
    const clientId = "web_" + Math.random().toString(16).substr(2, 8);
    const client = new Paho.MQTT.Client(host, port, "/mqtt", clientId);

    const statusDiv = document.getElementById("status");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const charCountSpan = document.getElementById("charCount");
    const deviceStateSpan = document.getElementById("deviceState");

    function updateCharCount() {
        charCountSpan.innerText = msgInput.value.length;
    }
    msgInput.addEventListener("input", updateCharCount);
    updateCharCount();

    function setStatus(online) {
        if (online) {
            statusDiv.innerHTML = "🟢 已連線";
            statusDiv.className = "status online";
        } else {
            statusDiv.innerHTML = "🔴 離線";
            statusDiv.className = "status offline";
        }
    }

    client.onConnectionLost = () => setStatus(false);
    client.onMessageArrived = (msg) => {
        if (msg.destinationName === "flagbot/status") {
            deviceStateSpan.innerText = msg.payloadString;
        }
    };

    client.connect({
        useSSL: true,
        userName: "william",
        password: "William970506",
        onSuccess: () => {
            setStatus(true);
            client.subscribe("flagbot/status");
        },
        onFailure: () => setStatus(false)
    });

    sendBtn.onclick = () => {
        const text = msgInput.value.trim();
        if (!text) return;
        if (!client.isConnected()) {
            setStatus(false);
            return;
        }
        const message = new Paho.MQTT.Message(text);
        message.destinationName = "screen/text";
        client.send(message);
        msgInput.value = "";
        updateCharCount();
    };
    msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendBtn.click();
    });
</script>
</body>
</html>
