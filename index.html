<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Heart-Sync 控制器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 400px;
            width: 90%;
            background: #222;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
        }
        button {
            background: #c9a96e;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .status {
            margin: 10px 0;
            font-size: 14px;
        }
        .online {
            color: #7a9e7e;
        }
        .offline {
            color: #c47b6e;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Heart-Sync</h1>
    <div id="status" class="status offline">● 連線中斷</div>
    <input type="text" id="msg" placeholder="輸入訊息" maxlength="100">
    <button id="send">發送訊息</button>
</div>

<script>
    // MQTT 設定
    const host = "a58c5e1007e94bcea2641a1d027cd2f9.s1.eu.hivemq.cloud";
    const port = 8884;
    const clientId = "web_" + Math.random().toString(16).substr(2, 8);
    const client = new Paho.MQTT.Client(host, port, "/mqtt", clientId);

    const statusDiv = document.getElementById("status");
    const msgInput = document.getElementById("msg");
    const sendBtn = document.getElementById("send");

    // 更新連線狀態顯示
    function setStatus(online) {
        if (online) {
            statusDiv.innerHTML = "● 已連線";
            statusDiv.className = "status online";
        } else {
            statusDiv.innerHTML = "● 連線中斷";
            statusDiv.className = "status offline";
        }
    }

    // 連線中斷事件
    client.onConnectionLost = () => setStatus(false);

    // 連線設定
    client.connect({
        useSSL: true,
        userName: "william",
        password: "William970506",
        onSuccess: () => {
            setStatus(true);
            client.subscribe("flagbot/status");
        },
        onFailure: () => setStatus(false)
    });

    // 發送訊息到主題 screen/text
    sendBtn.onclick = () => {
        const text = msgInput.value.trim();
        if (!text) return;
        if (!client.isConnected()) {
            setStatus(false);
            return;
        }
        const message = new Paho.MQTT.Message(text);
        message.destinationName = "screen/text";
        client.send(message);
        msgInput.value = "";
    };

    // 按下 Enter 也可以發送
    msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendBtn.click();
    });
</script>
</body>
</html>
