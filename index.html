<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart-Sync 控制器</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F7E7CE;
            --surface: #1a1814;
            --border: rgba(255,255,255,0.07);
            --text: #f0ece4;
            --text-dim: rgba(240,236,228,0.4);
            --gold: #c9a96e;
            --gold-dim: rgba(201,169,110,0.15);
            --green: #7a9e7e;
            --red: #c47b6e;
        }
 
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
 
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
 
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
 
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
 
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
 
        /* Subtle background texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(201,169,110,0.04) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(122,158,126,0.03) 0%, transparent 50%);
            pointer-events: none;
        }
 
        .container {
            width: 100%;
            max-width: 380px;
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
 
        /* Header */
        header {
            text-align: center;
            margin-bottom: 32px;
        }
 
        .logo-mark {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            position: relative;
        }
 
        .logo-mark::before, .logo-mark::after {
            content: '';
            position: absolute;
            border: 1px solid var(--gold);
            border-radius: 50%;
        }
 
        .logo-mark::before {
            width: 40px;
            height: 40px;
            top: 0; left: 0;
            opacity: 0.6;
        }
 
        .logo-mark::after {
            width: 20px;
            height: 20px;
            top: 10px; left: 10px;
            background: var(--gold);
            opacity: 0.4;
        }
 
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 10px;
        }
 
        #status-bar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--text-dim);
            transition: all 0.5s ease;
        }
 
        #status-bar .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
 
        #status-bar.online {
            color: var(--green);
            border-color: rgba(122,158,126,0.3);
            background: rgba(122,158,126,0.06);
        }
 
        #status-bar.online .dot {
            animation: pulse 2s ease-in-out infinite;
        }
 
        #status-bar.offline {
            color: var(--red);
            border-color: rgba(196,123,110,0.3);
            background: rgba(196,123,110,0.06);
        }
 
        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 16px;
        }
 
        .card-label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 20px;
        }
 
        /* Input */
        #msg-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }
 
        #msg-input:focus {
            border-color: rgba(201,169,110,0.4);
            background: rgba(201,169,110,0.04);
        }
 
        #msg-input::placeholder {
            color: rgba(240,236,228,0.2);
        }
 
        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 8px;
        }
 
        .btn:last-child { margin-bottom: 0; }
 
        .btn-primary {
            background: var(--gold);
            color: #0f0e0c;
        }
 
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-primary:active { transform: scale(0.97); filter: brightness(0.9); }
 
        .btn-ghost {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
 
        .btn-ghost:hover {
            border-color: rgba(255,255,255,0.15);
            color: var(--text);
        }
 
        .btn-ghost:active { transform: scale(0.97); }
 
        .btn-row {
            display: flex;
            gap: 10px;
        }
 
        .btn-row .btn { margin-bottom: 0; }
 
        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }
 
        /* Status card */
        #bot-status {
            font-size: 15px;
            color: var(--text-dim);
            font-weight: 300;
        }
 
        /* Footer */
        footer {
            text-align: center;
            margin-top: 24px;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(240,236,228,0.15);
        }
 
        /* Toast */
        #toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 22px;
            border-radius: 30px;
            font-size: 13px;
            letter-spacing: 1px;
            pointer-events: none;
            transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
            opacity: 0;
            white-space: nowrap;
            z-index: 100;
        }
 
        #toast.show {
            bottom: 36px;
            opacity: 1;
        }
 
        #toast.success {
            background: var(--green);
            color: #fff;
        }
 
        #toast.error {
            background: var(--red);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-mark"></div>
            <h1>Heart-Sync</h1>
            <div id="status-bar" class="offline">
                <span class="dot"></span>
                <span id="status-text">Connecting...</span>
            </div>
        </header>
 
        <main>
            <div class="card">
                <p class="card-label">傳送訊息</p>
                <input type="text" id="msg-input" placeholder="輸入文字，顯示到螢幕上..." autocomplete="off">
                <button id="btn-send" class="btn btn-primary">Send</button>
 
                <div class="divider"></div>
 
                <p class="card-label" style="margin-bottom:12px;">快速指令</p>
                <div class="btn-row">
                    <button id="btn-alert" class="btn btn-ghost">舉旗</button>
                    <button id="btn-clear" class="btn btn-ghost">放下</button>
                </div>
            </div>
 
            <div class="card">
                <p class="card-label">裝置狀態</p>
                <p id="bot-status">等待同步中</p>
            </div>
        </main>
 
        <footer>© 2026 Heart-Sync Protocol</footer>
    </div>
 
    <div id="toast"></div>
 
    <script>
        // ── MQTT 配置 ──────────────────────────────────
        const MQTT_HOST      = "a58c5e1007e94bcea2641a1d027cd2f9.s1.eu.hivemq.cloud";
        const MQTT_PORT      = 8884;
        const MQTT_USER      = "william";
        const MQTT_PASS      = "William970506";
        const MQTT_CLIENT_ID = "web_ctrl_" + Math.random().toString(16).substr(2, 5);
 
        const TOPIC_CMD    = "flagbot/cmd";
        const TOPIC_TEXT   = "screen/text";
        const TOPIC_STATUS = "flagbot/status";
        // ───────────────────────────────────────────────
 
        // Toast
        function showToast(msg, type = "success") {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.className = "show " + type;
            setTimeout(() => { t.className = ""; }, 2800);
        }
 
        // 用 MQTT.js 連線（wss:// 是 HiveMQ 私人 cluster 必須的）
        const client = mqtt.connect(`wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`, {
            username: MQTT_USER,
            password: MQTT_PASS,
            clientId: MQTT_CLIENT_ID,
            keepalive: 30,
            reconnectPeriod: 3000,
            rejectUnauthorized: false
        });
 
        client.on("connect", () => {
            document.getElementById("status-bar").className = "online";
            document.getElementById("status-text").textContent = "已連線";
            client.subscribe(TOPIC_STATUS);
        });
 
        client.on("error", (err) => {
            document.getElementById("status-bar").className = "offline";
            document.getElementById("status-text").textContent = "連線失敗";
            showToast("伺服器連線失敗", "error");
        });
 
        client.on("offline", () => {
            document.getElementById("status-bar").className = "offline";
            document.getElementById("status-text").textContent = "連線已中斷";
        });
 
        client.on("message", (topic, payload) => {
            document.getElementById("bot-status").textContent = payload.toString();
        });
 
        // 發送文字
        document.getElementById("btn-send").onclick = () => {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!client.connected) return showToast("尚未連線", "error");
            if (!text) return showToast("請輸入訊息", "error");
            client.publish(TOPIC_TEXT, text);
            showToast("訊息已發送！");
            input.value = "";
        };
 
        // Enter 鍵送出
        document.getElementById("msg-input").addEventListener("keydown", (e) => {
            if (e.key === "Enter") document.getElementById("btn-send").click();
        });
 
        // 快速指令
        document.getElementById("btn-alert").onclick = () => {
            if (!client.connected) return showToast("尚未連線", "error");
            client.publish(TOPIC_CMD, "alert");
            showToast("指令已發送");
        };
 
        document.getElementById("btn-clear").onclick = () => {
            if (!client.connected) return showToast("尚未連線", "error");
            client.publish(TOPIC_CMD, "clear");
            showToast("指令已發送");
        };
    </script>
</body>
</html>
